services:
  clinical-rag-agent:
    build:
      context: ./clinical-rag-agent
      dockerfile: Dockerfile
    image: portfolio-clinical-rag-agent:local
    container_name: portfolio-clinical-rag-agent
    env_file:
      - path: ./clinical-rag-agent/.env
        required: false
    ports:
      - ${CLINICAL_RAG_PORT-8000}:8000
    volumes:
      - clinical-rag-data:/app/data
    restart: unless-stopped

  open-webui:
    build:
      context: ./open-webui
      dockerfile: Dockerfile
      args:
        USE_SLIM: ${USE_SLIM-true}
        USE_OLLAMA: ${USE_OLLAMA-false}
        NODE_BUILD_MEMORY: ${NODE_BUILD_MEMORY-4096}
    image: portfolio-open-webui:local
    container_name: portfolio-open-webui
    depends_on:
      - clinical-rag-agent
    env_file:
      - path: ./open-webui/.env
        required: false
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  clinical-rag-data: {}
  open-webui-data: {}
