services:
  ollama:
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama

  clinical-rag-agent:
    build:
      context: ./clinical-rag-agent
      dockerfile: Dockerfile
    image: clinical-rag-agent:local
    container_name: clinical-rag-agent
    ports:
      - ${CLINICAL_RAG_PORT-8000}:8000
    environment:
      - CLINICAL_RAG_DATA_DIR=/app/data
      - CLINICAL_RAG_API_KEY=${CLINICAL_RAG_API_KEY-local-dev-key}
      - CLINICAL_RAG_LLM_PROVIDER=${CLINICAL_RAG_LLM_PROVIDER-stub}
      - CLINICAL_RAG_LLM_BASE_URL=${CLINICAL_RAG_LLM_BASE_URL-}
      - CLINICAL_RAG_LLM_API_KEY=${CLINICAL_RAG_LLM_API_KEY-}
      - CLINICAL_RAG_LLM_MODEL=${CLINICAL_RAG_LLM_MODEL-}
    volumes:
      - clinical-rag-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  open-webui:
    build:
      context: ./open-webui
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    depends_on:
      ollama:
        condition: service_started
      clinical-rag-agent:
        condition: service_healthy
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URLS=http://clinical-rag-agent:8000/v1
      - OPENAI_API_KEYS=${CLINICAL_RAG_API_KEY-local-dev-key}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY-}
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  open-webui: {}
  clinical-rag-data: {}

